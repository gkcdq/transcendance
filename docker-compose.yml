version: '3.8'
services:
  db:
    image: postgres:15
    container_name: db
    restart: always
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always

  backend:
    build: ./backend
    container_name: backend
    volumes:
      - ./backend:/app
      - /app/node_modules
      - media_data:/app/media
    env_file: .env
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    container_name: frontend
    volumes:
      - ./frontend:/app
    ports:
      - "8080:80"

  nginx:
    build: ./nginx
    container_name: nginx
    ports:
      - "8443:443"
    volumes:
      - ./frontend:/var/www/html
      - ./backend/staticfiles:/var/www/static:ro
      - media_data:/app/media
    depends_on:
      - backend

volumes:
  postgres_data:
  static_volume:
  media_data: